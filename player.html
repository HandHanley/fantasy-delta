<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0F1A;color:#EAF0F4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:#10B981;text-decoration:none}
a:hover{text-decoration:underline}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #1E2A3A}
.nav-back{font-size:12px;color:#8CA0B3;display:flex;align-items:center;gap:5px;transition:color .15s}

.hero{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.hero-hs{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #1E2A3A;background:#111A28;flex-shrink:0}
.hero-ph{width:72px;height:72px;border-radius:50%;background:#111A28;border:1px solid #1E2A3A;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;color:#5C7080}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#EAF0F4;line-height:1.1;margin-bottom:5px}
.hero-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px;color:#8CA0B3;margin-bottom:3px}
.hero-bg{font-size:11px;color:#8CA0B3;margin-bottom:7px}
.hero-verdict{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.verdict-badge{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.hero-vals{font-size:11px;color:#8CA0B3}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.03em}
.bs{background:#0D1420;color:#10B981}

.bd{background:#0D1420;color:#EA7A66}

<script>
const params = new URLSearchParams(location.search);
const PLAYER_NAME = decodeURIComponent(params.get('name') || params.get('player') || '');

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  const el = document.getElementById('state-error');
  el.style.display = '';
  el.innerHTML = msg + '<br><br><a href="index.html">← Back to Rankings</a>';
}

function showContent(html) {
  document.getElementById('state-loading').style.display = 'none';
  const el = document.getElementById('player-content');
  el.style.display = '';
  el.innerHTML = html;
}

function ppgClr(v) {
  return v >= 18 ? '#10B981' : v >= 14 ? '#6BB6E0' : v >= 10 ? '#E0B34D' : v > 0 ? '#E05745' : '#1E2A3A';
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function buildHeroHTML(p) {
  const ct = CONTRACTS.find(c => c.n === p.n);
  const dp = DRAFT_PICKS[p.n];
  const team = (typeof AL !== 'undefined' && AL[p.t]) ? AL[p.t] : p.t;
  const vt = (vTag(p).match(/>([a-z ]+)</) || [,''])[1];
  const vc = vt.includes('strong buy') ? '#10B981' : vt === 'buy' ? '#10B981'
    : vt === 'hold' ? '#EAF0F4' : vt.includes('strong sell') ? '#EA7A66' : '#E05745';
  const mv = mvAsset(p);
  const adjP = getAdjProj(p);
  const hs = (typeof HEADSHOTS !== 'undefined') && HEADSHOTS[p.n];
  const hsHtml = hs
    ? `<img class="hero-hs" src="${hs}" alt="${p.n}" onerror="this.outerHTML='<div class=hero-ph>👤</div>'">`
    : `<div class="hero-ph">👤</div>`;

  // College + draft on same muted line, no accent color for draft pick
  const bgParts = [];
  if (COLLEGES && COLLEGES[p.n]) bgParts.push(COLLEGES[p.n]);
  if (dp) bgParts.push(`${dp.y} Rd${dp.r} Pick ${dp.p}`);
  const bgLine = bgParts.length ? `<div class="hero-bg">${bgParts.join(' · ')}</div>` : '';

  return `<div class="hero">
    ${hsHtml}
    <div class="hero-info">
      <div class="hero-name">${p.n}</div>
      <div class="hero-meta">
        <span class="badge bn">${p.pos}</span>
        <span>${team}</span>
        <span>Age ${p.a.toFixed(1)}</span>
        ${ct ? `<span style="color:#8CA0B3">Thru ${ct.end}${ct.end<=2026?' ⚠':''}${fifthYearNote(p,ct)?' +opt':''}</span>` : ''}
      </div>
      ${bgLine}
      <div class="hero-verdict">
        <span class="verdict-badge" style="color:${vc}">${vt}</span>
        <span class="hero-vals">Mkt ${(p.ktcEff!=null?p.ktcEff:(p.ktc!=null?p.ktc:0)).toLocaleString()} · Model ${mv>=19999?'19,999+':(mv!=null?mv:0).toLocaleString()} · Proj ${(adjP!=null?adjP:0).toFixed(1)} PPG</span>
      </div>
    </div>
  </div>`;
}

// ── DELTA Score Arc ──────────────────────────────────────────────────────────
function buildDSTrajectoryHTML(p) {
  if (isNFLRookie(p)) {
    // A rookie's score is a draft-capital prior — there is no prior season to
    // estimate and no basis to roll one forward. Fabricating a year-2 score
    // from a conservative seed reads as a bust call; the honest display is
    // the current prior and a note that the trajectory unlocks with real games.
    return `<div class="card">
      <div class="card-label" style="margin-bottom:8px">DELTA Score Trajectory</div>
      <div style="display:flex;align-items:baseline;gap:10px">
        <span style="font-size:26px;font-weight:800;color:${dsColor(p.dsScore)}">${p.dsScore}</span>
        <span style="font-size:10px;color:#8CA0B3">2025 — draft-capital prior</span>
      </div>
      <div style="font-size:9.5px;color:#5C7080;margin-top:8px;line-height:1.5">
        Rookie — no NFL seasons to chart. The score is a capital-based prior; the trajectory unlocks once real games replace it.
      </div>
    </div>`;
  }
  const ds = p.dsScore;
  if (ds == null) return '';
  const pos = p.pos || p.p || 'WR';

  // 2024 estimate: age-1, use ppg24 as recent production, same opp/contract as approx
  const prevAge = (p.a || 22) - 1;
  const pA = dsAge(prevAge, pos);
  const pP = dsProduction(p.ppg24||0, p.ppg23||0, p.ppg22||0, p.g24||16, pos, p);
  const pO = dsOpportunity(p);
  const pC = dsCont(p);
  const ds2024 = Math.round(Math.min(99, pA + pP + pO + pC));

  // 2026 projection: age+1, projected PPG as new recent season
  const nextAge = (p.a || 22) + 1;
  const nA = dsAge(nextAge, pos);
  const nP = dsProduction(p.proj||p.ppg25||0, p.ppg25||0, p.ppg24||0, p.g25||0, pos, p);
  const nO = dsOpportunity(p);
  const nC = dsCont(p);
  const ds2026 = Math.round(Math.min(p.g25===0 ? 89 : 99, nA + nP + nO + nC));

  const dsC = dsColor(ds);
  const d4C = dsColor(ds2024);
  const d6C = dsColor(ds2026);

  const bar = (score, color) => `
    <div style="height:4px;background:#111A28;border-radius:3px;overflow:hidden;margin-bottom:4px">
      <div style="width:${Math.round((score/99)*100)}%;height:100%;background:${color};border-radius:3px"></div>
    </div>`;

  const pt = (yr, score, color, note) => `
    <div style="flex:1;text-align:center">
      <div style="font-size:9px;color:#5C7080;margin-bottom:5px">${yr}</div>
      ${bar(score, color)}
      <div style="font-size:24px;font-weight:800;line-height:1;color:${color}">${score}</div>
      <div style="font-size:9px;color:#5C7080;margin-top:3px">${note}</div>
    </div>`;

  const arr = (from, to) => {
    const c = to > from ? '#10B981' : to < from ? '#EA7A66' : '#8CA0B3';
    const sym = to > from ? '↑' : to < from ? '↓' : '→';
    return `<div style="font-size:18px;color:${c};padding-top:18px;flex-shrink:0">${sym}</div>`;
  };

  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">DELTA Score Arc</div>
    <div class="card-sub" style="margin-bottom:14px">Estimated 2024 · Current 2025 · Projected 2026</div>
    <div style="display:flex;align-items:flex-start;gap:8px">
      ${pt('2024 est', ds2024, d4C, 'approx')}
      ${arr(ds2024, ds)}
      ${pt('2025', ds, dsC, 'current')}
      ${arr(ds, ds2026)}
      ${pt('2026 proj', ds2026, d6C, 'if proj holds')}
    </div>
    <div style="font-size:9px;color:#5C7080;margin-top:10px;text-align:center">
      2024 uses age−1 and prior production · opportunity &amp; contract approximated from current values
    </div>
  </div>`;
}

// ── PPG Trend ─────────────────────────────────────────────────────────────────
function buildProductionHTML(p) {
  const years = [
    { yr: '2022', ppg: p.ppg22 || 0, g: p.g22 || null },
    { yr: '2023', ppg: p.ppg23 || 0, g: p.g23 || null },
    { yr: '2024', ppg: p.ppg24 || 0, g: p.g24 || null },
    { yr: '2025', ppg: p.ppg25 || 0, g: p.g25 || null },
  ].filter(y => y.ppg > 0);
  if (!years.length) return '';

  const posAvg = DS_AVG[p.pos] || 12;
  const maxPpg = Math.max(...years.map(y => y.ppg), 1);
  const barH = 56;

  // Three separate rows: values, bars, labels
  const vals = years.map(y =>
    `<div style="flex:1;text-align:center;font-size:10px;font-weight:600;color:${ppgClr(y.ppg)}">${y.ppg.toFixed(1)}</div>`
  ).join('');

  const bars = years.map(y => {
    const h = Math.max(8, Math.round((y.ppg / maxPpg) * barH));
    return `<div style="flex:1;display:flex;align-items:flex-end">
      <div style="width:100%;height:${h}px;background:${ppgClr(y.ppg)};border-radius:2px 2px 0 0"></div>
    </div>`;
  }).join('');

  const lbls = years.map(y =>
    `<div style="flex:1;text-align:center;font-size:9px;color:#5C7080">${y.yr.slice(2)}</div>`
  ).join('');

  const tableRows = years.map(y => {
    const diff = (y.ppg - posAvg).toFixed(1);
    const dc = diff > 0 ? '#10B981' : diff < 0 ? '#EA7A66' : '#8CA0B3';
    return `<tr>
      <td>${y.yr}</td>
      <td style="color:${ppgClr(y.ppg)};font-weight:600">${y.ppg.toFixed(1)}</td>
      <td style="color:#8CA0B3">${y.g != null && y.g > 0 ? y.g : '—'}</td>
      <td style="color:${dc}">${diff > 0 ? '+' : ''}${diff}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">PPG Trend</div>
    <div class="card-sub" style="margin-bottom:10px">Adjusted for current scoring format</div>
    <div style="display:flex;gap:4px;margin-bottom:2px">${vals}</div>
    <div style="display:flex;gap:4px;height:${barH}px">${bars}</div>
    <div style="display:flex;gap:4px;margin-top:3px;margin-bottom:10px">${lbls}</div>
    <table class="prod-table">
      <thead><tr>
        <th>Season</th><th>PPG</th><th>Games</th>
        <th title="PPG vs current-season positional average — same value used across all years">vs pos avg *</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div style="font-size:9px;color:#5C7080;margin-top:6px">* Pos avg = ${posAvg} PPG (current-season average, applied flat across all years) · Games load from nightly pipeline</div>
  </div>`;
}

// ── EPA / Efficiency ──────────────────────────────────────────────────────────
// QB TD% trend — DISPLAY ONLY. Context for the manager; never feeds the DELTA Score.
// Research (2017-25, 203 QB pairs): ~69% of the gap between a season's TD% and the QB's
// own baseline is given back the next year. It did NOT add lift to fantasy projection
// beyond production DELTA already models — so we show it, we don't score it.
function buildTDPctHTML(p) {
  if (p.pos !== 'QB' || typeof PLAYER_STATS === 'undefined' || !PLAYER_STATS[p.n]) return '';
  const LG = 4.6, GIVEBACK = 0.69;
  const st = PLAYER_STATS[p.n];
  const yrs = ['2022', '2023', '2024', '2025'];
  const rows = yrs.map(y => {
    const s = st[y];
    const att = (s && +s.pass_att) || 0, td = (s && +s.pass_td) || 0;
    return { yr: y, v: att >= 100 ? (100 * td / att) : 0, att };   // 100-att floor: a cameo has no meaningful rate
  }).filter(x => x.v > 0);
  if (!rows.length) return '';

  let cTd = 0, cAtt = 0;
  yrs.forEach(y => {
    const s = st[y];
    if (s && +s.pass_att >= 100) { cTd += (+s.pass_td || 0); cAtt += (+s.pass_att || 0); }
  });
  const baseline = cAtt > 0 ? (100 * cTd / cAtt) : LG;   // attempt-weighted, not a mean of rates
  const latest = rows[rows.length - 1];
  const r1 = v => Math.round(v * 10) / 10;   // moved up: was declared after first use (TDZ crash on QB pages)
  const gap = r1(latest.v) - r1(baseline);
  const proj = latest.v - gap * GIVEBACK;
  const maxV = Math.max(...rows.map(x => x.v), baseline, 6);
  const barH = 46;
  // colored vs HIS OWN baseline — a high TD% is not "good", it's "hot"
  // Grade on DISPLAYED (1-dp) numbers so two seasons that both read e.g. "7.0%" can never
  // get different colors from a float straddling the threshold.
  const HOT = 1.0;
  const clr = v => (r1(v) - r1(baseline)) >= HOT ? '#E0B34D' : (r1(v) - r1(baseline)) <= -HOT ? '#6BB6E0' : '#5C7080';

  const vals = rows.map(x => `<div style="flex:1;text-align:center;font-size:10px;color:#8CA0B3">${x.v.toFixed(1)}%</div>`).join('');
  const bars = rows.map(x => `<div style="flex:1;display:flex;align-items:flex-end;justify-content:center">
      <div style="width:100%;border-radius:3px 3px 0 0;background:${clr(x.v)};height:${Math.max(8, Math.round(x.v / maxV * barH))}px"></div>
    </div>`).join('');
  const lbls = rows.map(x => `<div style="flex:1;text-align:center;font-size:9px;color:#5C7080">'${x.yr.slice(2)}</div>`).join('');

  let note = '';
  if (Math.abs(gap) >= HOT && rows.length >= 2) {
    const hot = gap > 0;
    note = `<div style="font-size:11px;line-height:1.6;color:#8CA0B3;margin-top:10px;padding:8px 10px;background:#0D1420;border-left:2px solid ${hot ? '#E0B34D' : '#6BB6E0'};border-radius:0 6px 6px 0">
      TD rate <b style="color:${hot ? '#E0B34D' : '#6BB6E0'}">${latest.v.toFixed(1)}%</b> is
      <b style="color:${hot ? '#E0B34D' : '#6BB6E0'}">${Math.abs(gap).toFixed(1)} pts ${hot ? 'above' : 'below'}</b>
      his own baseline of ${baseline.toFixed(1)}%.
      ${hot ? 'Historically ~69% of that gap is given back' : 'Rates this far below a QB\'s norm tend to bounce back'} —
      a repeat would look closer to <b style="color:#EAF0F4">${proj.toFixed(1)}%</b>.
    </div>`;
  }

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div>
        <div class="card-label" style="margin-bottom:2px">TD% Trend</div>
        <div class="card-sub">Passing TDs per attempt · context only, not scored</div>
      </div>
      <div style="text-align:right;line-height:1.4;flex-shrink:0">
        <div style="font-size:11px;color:#8CA0B3">Baseline <b style="color:#EAF0F4;font-family:var(--mono)">${baseline.toFixed(1)}%</b></div>
        <div style="font-size:11px;color:#5C7080">Lg Avg. <b style="font-family:var(--mono)">${LG}%</b></div>
      </div>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:2px">${vals}</div>
    <div style="display:flex;gap:4px;height:${barH}px">${bars}</div>
    <div style="display:flex;gap:4px;margin-top:3px">${lbls}</div>
    <div style="display:flex;gap:12px;margin-top:7px;font-size:10px;color:#5C7080">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#E0B34D;margin-right:4px"></span>above his norm — due to regress</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#6BB6E0;margin-right:4px"></span>below — due to bounce back</span>
    </div>
    ${note}
  </div>`;
}

function buildEPAHTML(p) {
  const posLabel = p.pos === 'QB' ? 'Passing' : p.pos === 'RB' ? 'Rushing' : 'Receiving';
  const sublabel = `${posLabel} EPA per play by season — how much scoring value this player added above average on each touch or route`;

  const epas = [
    { yr: '2022', v: p.e22 || 0 },
    { yr: '2023', v: p.e23 || 0 },
    { yr: '2024', v: p.e24 || 0 },
    { yr: '2025', v: p.e25 || 0 },
  ].filter(x => x.v !== 0);

  if (!epas.length) return '';

  // Absolute scale: 0.25 EPA/play fills the bar fully (elite level for any position)
  const SCALE = 0.25;

  const getClr = v => {
    const a = Math.abs(v);
    if (v >= 0) return a >= 0.12 ? '#10B981' : a >= 0.04 ? '#34D399' : '#E0B34D';
    else        return a >= 0.12 ? '#E05745' : a >= 0.04 ? '#EA7A66' : '#E0B34D';
  };

  const rows = epas.map(x => {
    const pct = Math.min(100, Math.round((Math.abs(x.v) / SCALE) * 100));
    const clr = getClr(x.v);
    const isPos = x.v >= 0;
    const sign = x.v > 0 ? '+' : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #111A28">
      <div style="font-size:10px;color:#8CA0B3;width:26px;flex-shrink:0">${x.yr.slice(2)}</div>
      <div style="flex:1;display:flex;justify-content:flex-end;align-items:center;height:8px">
        ${!isPos ? `<div style="width:${pct}%;height:100%;background:${clr};border-radius:3px 0 0 3px"></div>` : ''}
      </div>
      <div style="width:2px;height:14px;background:#5C7080;flex-shrink:0;border-radius:1px"></div>
      <div style="flex:1;display:flex;justify-content:flex-start;align-items:center;height:8px">
        ${isPos ? `<div style="width:${pct}%;height:100%;background:${clr};border-radius:0 3px 3px 0"></div>` : ''}
      </div>
      <div style="font-size:11px;font-weight:600;color:${clr};width:42px;text-align:right">${sign}${x.v.toFixed(2)}</div>
    </div>`;
  }).join('');

  const trendClr = p.epaTr === 'up' ? '#10B981' : p.epaTr === 'down' ? '#E05745' : '#8CA0B3';
  const trendTxt = p.epaTr === 'up' ? '↑ Improving' : p.epaTr === 'down' ? '↓ Declining' : '→ Flat';

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div class="card-label" style="margin-bottom:2px">EPA per Play</div>
        <div class="card-sub">${sublabel}</div>
      </div>
      ${p.epaTr ? `<span style="font-size:10px;font-weight:600;color:${trendClr};flex-shrink:0;margin-left:10px">${trendTxt}</span>` : ''}
    </div>
    ${rows}
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#5C7080;margin-top:6px;padding:0 34px 0 0">
      <span>← below avg</span>
      <span>above avg →</span>
    </div>
  </div>`;
}

// ── Opportunity ───────────────────────────────────────────────────────────────
function buildOpportunityHTML(p) {
  const oppSc = getOppScore(p.n, p.pos);
  if (!oppSc) {
    // QBs (and anyone ungraded for opportunity) still get the scheme context —
    // popup ⊆ full card: nothing shown in the popup may be missing here.
    if (p.sys == null) return '';
    return `<div class="card">
      <div class="card-label" style="margin-bottom:8px">Offense / Scheme</div>
      ${buildSchemeHTML(p)}
    </div>`;
  }
  const st25 = (typeof PLAYER_STATS !== 'undefined') && PLAYER_STATS[p.n] && PLAYER_STATS[p.n]['2025'];
  const isWR = p.pos === 'WR' || p.pos === 'TE';
  const scC = oppScoreColor ? oppScoreColor(oppSc) : (oppSc>=88?'#10B981':oppSc>=70?'#6BB6E0':oppSc>=55?'#E0B34D':'#E05745');
  const tier = oppSc>=88?(isWR?'Elite alpha':'Elite workhorse'):oppSc>=75?'Clear starter':oppSc>=60?'Role player':'Committee/specialist';
  const sysClr = p.sys>=70?'#10B981':p.sys>=55?'#6BB6E0':p.sys>=40?'#E0B34D':'#E05745';

  let usageRows = '';
  if (st25) {
    const tgtS = st25.target_share || 0;
    const airS = st25.air_yds_share || 0;
    const rzT = st25.rz_targets;
    const rzC = st25.rz_carries;
    if (isWR) {
      usageRows = [
        ['Target share', (tgtS*100).toFixed(1)+'%', tgtS>=.28?'#10B981':tgtS>=.20?'#6BB6E0':tgtS>=.14?'#E0B34D':'#E05745'],
        ['Air yards share', (airS*100).toFixed(1)+'%', airS>=.38?'#10B981':airS>=.28?'#6BB6E0':airS>=.18?'#E0B34D':'#E05745'],
        ['RZ targets', rzT!=null?rzT:'—', rzT>=18?'#10B981':rzT>=12?'#6BB6E0':rzT>=7?'#E0B34D':'#E05745'],
      ].map(([l,v,c])=>`<div class="bdr-row"><span style="color:#8CA0B3">${l}</span><span style="font-weight:600;color:${c}">${v}</span></div>`).join('');
    } else {
      const g = st25.games || 17;
      const rsRaw = st25.rush_share || 0;
      // Apply same 17/g adjustment used in workhorse score — rush_share in the pipeline
      // is a season total ratio (player carries / team carries), so it's diluted by missed
      // games. Adjusted value reflects true per-game role intensity when active.
      const rsAdj = Math.min(1, rsRaw * (17 / g));
      const rsLabel = g < 17 ? `Rush share/game · ${g}g` : 'Rush share';
      usageRows = [
        [rsLabel, (rsAdj*100).toFixed(1)+'%', rsAdj>=.55?'#10B981':rsAdj>=.40?'#6BB6E0':rsAdj>=.25?'#E0B34D':'#E05745'],
        ['Target share', (tgtS*100).toFixed(1)+'%', tgtS>=.18?'#10B981':tgtS>=.12?'#6BB6E0':tgtS>=.08?'#E0B34D':'#E05745'],
        ['RZ carries', rzC!=null?rzC:'—', rzC>=55?'#10B981':rzC>=35?'#6BB6E0':rzC>=20?'#E0B34D':'#E05745'],
        ['RZ targets', rzT!=null?rzT:'—', rzT>=12?'#10B981':rzT>=7?'#6BB6E0':rzT>=3?'#E0B34D':'#E05745'],
      ].map(([l,v,c])=>`<div class="bdr-row"><span style="color:#8CA0B3">${l}</span><span style="font-weight:600;color:${c}">${v}</span></div>`).join('');
    }
  }

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${usageRows?'10px':'0'}">
      <div>
        <div class="card-label" style="margin-bottom:2px">Opportunity · 2025</div>
        <div class="card-sub" style="color:${scC};font-weight:600">${tier}</div>
      </div>
      <div style="font-size:32px;font-weight:800;line-height:1;color:${scC}">${oppSc}</div>
    </div>
    ${usageRows}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #111A28">
      ${buildSchemeHTML(p)}
    </div>
  </div>`;
}

// ── Age Curve ─────────────────────────────────────────────────────────────────
function buildAgeCurveHTML(p) {
  const pos = p.pos || p.p || 'WR';
  const ages = Array.from({length: 19}, (_, i) => i + 20); // 20–38
  const scores = ages.map(a => dsAge(a, pos));
  const W = 320, H = 72, padL = 28, padR = 8, padT = 10, padB = 18;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const toX = a => padL + ((a - 20) / 18) * plotW;
  const toY = s => padT + plotH - (s / 25) * plotH;

  const points = ages.map((a, i) => toX(a).toFixed(1) + ',' + toY(scores[i]).toFixed(1)).join(' ');

  // Peak zone — ages where score >= 23
  const peakAges = ages.filter(a => dsAge(a, pos) >= 23);
  const peakStart = peakAges[0] || 20;
  const peakEnd = peakAges[peakAges.length - 1] || 27;
  const pkX1 = toX(peakStart), pkX2 = toX(peakEnd);

  // Fill path under curve (area chart feel)
  const fillPts = ages.map((a, i) => toX(a).toFixed(1) + ',' + toY(scores[i]).toFixed(1)).join(' ');
  const fillPath = 'M ' + toX(20).toFixed(1) + ',' + toY(0).toFixed(1)
    + ' L ' + fillPts.split(' ').join(' L ')
    + ' L ' + toX(38).toFixed(1) + ',' + toY(0).toFixed(1) + ' Z';

  // Player marker
  const clampedAge = Math.min(38, Math.max(20, p.a || 25));
  const playerScore = dsAge(clampedAge, pos);
  const mx = toX(clampedAge), my = toY(playerScore);
  const col = dsColor(p.dsScore || 50);

  // Y-axis ticks at 0, 12, 25
  const yTicks = [0, 12, 25].map(s =>
    '<line x1="' + (padL-3) + '" y1="' + toY(s).toFixed(1) + '" x2="' + padL + '" y2="' + toY(s).toFixed(1) + '" stroke="#1E2A3A" stroke-width="1"/>'
    + '<text x="' + (padL-5) + '" y="' + (toY(s)+3).toFixed(1) + '" fill="#5C7080" font-size="6" text-anchor="end">' + s + '</text>'
  ).join('');

  const ageLabels = [20, 24, 28, 32, 36, 38].map(a =>
    '<text x="' + toX(a).toFixed(1) + '" y="' + (padT+plotH+13) + '" fill="#5C7080" font-size="6" text-anchor="middle">' + a + '</text>'
  ).join('');

  return '<div class="card">'
    + '<div class="card-label" style="margin-bottom:2px">Age Curve · ' + pos + '</div>'
    + '<div class="card-sub" style="margin-bottom:8px">Dynasty value score vs age — green shading marks the prime window</div>'
    + '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;overflow:visible">'

    // Peak zone shading
    + '<rect x="' + pkX1.toFixed(1) + '" y="' + padT + '" width="' + (pkX2-pkX1).toFixed(1) + '" height="' + plotH + '" fill="#10B981" opacity="0.07" rx="2"/>'

    // Fill under curve
    + '<path d="' + fillPath + '" fill="#5C7080" opacity="0.2"/>'

    // Curve line
    + '<polyline points="' + points + '" fill="none" stroke="#5C7080" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>'

    // Axes
    + '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (padT+plotH) + '" stroke="#1E2A3A" stroke-width="1"/>'
    + '<line x1="' + padL + '" y1="' + (padT+plotH) + '" x2="' + (W-padR) + '" y2="' + (padT+plotH) + '" stroke="#1E2A3A" stroke-width="1"/>'

    // Y ticks + labels
    + yTicks

    // Age labels
    + ageLabels

    // No floating "prime" label in SVG — the green shading shows the window; footer note carries the text

    // Player dot + vertical guide
    + '<line x1="' + mx.toFixed(1) + '" y1="' + (padT+plotH) + '" x2="' + mx.toFixed(1) + '" y2="' + my.toFixed(1) + '" stroke="' + col + '" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>'
    + '<circle cx="' + mx.toFixed(1) + '" cy="' + my.toFixed(1) + '" r="4.5" fill="' + col + '" stroke="#0A0F1A" stroke-width="1.5"/>'

    // Player age label — above dot normally, below when near top to avoid colliding with "prime" label
    + (playerScore >= 22
      ? '<text x="' + mx.toFixed(1) + '" y="' + (my+16).toFixed(1) + '" fill="' + col + '" font-size="6" text-anchor="middle" font-weight="bold">' + clampedAge.toFixed(1) + '</text>'
      : '<text x="' + mx.toFixed(1) + '" y="' + (my-8).toFixed(1)  + '" fill="' + col + '" font-size="6" text-anchor="middle" font-weight="bold">' + clampedAge.toFixed(1) + '</text>'
    )

    + '</svg>'
    + '<div style="font-size:9px;color:#5C7080;text-align:center;margin-top:2px">'
    + pos + ' prime: ages ' + peakStart + '–' + peakEnd + ' · Age score ' + playerScore + '/25'
    + '</div>'
    + '</div>';
}

// ── Comparable Players ────────────────────────────────────────────────────────
function buildComparableHTML(p) {
  const pos = p.pos || p.p || 'WR';
  const ds = p.dsScore;
  if (ds == null) return '';

  const myOpp = getOppScore(p.n, pos) || 50;

  const peers = COMP.filter(x =>
    (x.pos||x.p) === pos &&
    x.n !== p.n &&
    x.dsScore != null &&
    Math.abs((x.dsScore||0) - ds) <= 22
  );

  const scored = peers.map(peer => {
    const dsDiff = Math.abs((peer.dsScore||0) - ds);
    const ageDiff = Math.abs((peer.a||0) - (p.a||0));
    const peerOpp = getOppScore(peer.n, peer.pos) || 50;
    const oppDiff = Math.abs(peerOpp - myOpp);
    const sim = dsDiff * 2.5 + ageDiff * 4.0 + oppDiff * 0.4;
    return { peer, sim, dsDiff, ageDiff };
  });

  const comps = scored.sort((a, b) => a.sim - b.sim).slice(0, 3);
  if (!comps.length) return '';

  const cards = comps.map(({peer, dsDiff, ageDiff}) => {
    const vt = (vTag(peer).match(/>([a-z ]+)</) || [,''])[1];
    const vc = vt.includes('strong buy') ? '#10B981' : vt === 'buy' ? '#10B981'
      : vt === 'hold' ? '#EAF0F4' : vt.includes('strong sell') ? '#EA7A66' : '#E05745';
    const dsc = dsColor(peer.dsScore);
    const team = (typeof AL !== 'undefined' && AL[peer.t]) ? AL[peer.t] : peer.t;
    const note = dsDiff <= 2 ? 'near-identical score'
      : ageDiff <= 0.8 ? 'same age tier'
      : ageDiff <= 1.5 ? (peer.a > p.a ? 'slightly older' : 'slightly younger')
      : 'similar profile';

    return '<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#0D1420;border-radius:6px">'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:12px;font-weight:600;margin-bottom:2px">'
      + '<a href="player.html?name=' + encodeURIComponent(peer.n) + '" style="color:#EAF0F4;text-decoration:none" '
      + 'onmouseover="this.style.color=\'#10B981\'" onmouseout="this.style.color=\'#EAF0F4\'">' + peer.n + '</a>'
      + '</div>'
      + '<div style="font-size:10px;color:#8CA0B3">' + team + ' · Age ' + peer.a.toFixed(1) + ' · ' + note + '</div>'
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-size:20px;font-weight:800;color:' + dsc + ';line-height:1">' + peer.dsScore + '</div>'
      + '<div style="font-size:10px;font-weight:700;color:' + vc + ';text-transform:uppercase;letter-spacing:.04em">' + vt + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  return '<div class="card">'
    + '<div class="card-label" style="margin-bottom:2px">Comparable Players</div>'
    + '<div class="card-sub" style="margin-bottom:10px">Closest DELTA matches at ' + pos + ' — ranked by score, age, and opportunity similarity</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">' + cards + '</div>'
    + '</div>';
}

// ── Main render ───────────────────────────────────────────────────────────────
// ── Game Log (uses shared gameLogShell from delta-engine.js) ──────────────────
function buildGameLogCard(p) {
  if (typeof gameLogShell !== 'function') return '';
  _glPlayer = p; _glSeason = null; _glView = 'table';
  const shell = gameLogShell(p);
  if (!shell) return '';
  return `<div class="card">${shell}</div>`;
}

function renderPlayerPage(p) {
  try { _renderPlayerPage(p); }
  catch(e){
    // A single bad field must never blank the whole page. Show what we can + the error.
    console.error('render error:', e);
    showError('Some sections could not render for this player. ' + (e.message||''));
  }
}
function _renderPlayerPage(p) {
  ensureScoutData().then(() => {
    const el = document.getElementById('scout-text');
    if (el) {
      el.style.color = '#8CA0B3';
      el.textContent = SCOUT[p.n] || 'No scouting report available yet.';
    }
  });

  showContent(`
    ${buildHeroHTML(p)}
    ${buildDSBreakdownHTML(p)}
    ${buildReadHTML(p)}
    ${buildStartProfileCard(p)}
    ${buildGameLogCard(p)}
    ${buildDSTrajectoryHTML(p)}
    ${buildAgeCurveHTML(p)}
    ${buildProductionHTML(p)}
    ${buildTDPctHTML(p)}
    ${buildEPAHTML(p)}
    ${buildOpportunityHTML(p)}
    ${buildContractHTML(p)}
    ${buildRippleHTML(p)}
    ${buildComparableHTML(p)}
    ${buildScoutHTML()}
    <div class="freshness">Data refreshes nightly · DELTA v1.0</div>
  `);
  const _glb=document.getElementById('dd-gamelog-body'),_glc=document.getElementById('gl-chev');
  if(_glb){_glb.style.display='block';if(_glc)_glc.style.transform='rotate(90deg)';}
  document.title = p.n + ' — DELTA';
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Sync league preferences from main app so scores & verdicts match
try {
  const prefs = JSON.parse(localStorage.getItem('delta_settings') || '{}');
  if (prefs.teams) leagueTeams = parseInt(prefs.teams);
  if (prefs.qb)    qbFmt       = prefs.qb;
  if (prefs.fmt)   scoringFmt  = prefs.fmt;
} catch(e) {}

if (!PLAYER_NAME) {
  showError('No player specified. Use <code>player.html?name=Josh+Allen</code>');
} else {
  loadLiveMarketValues()
    .then(() => loadPlayerStats())
    .then(() => loadPlayerContracts())
    .then(() => loadRipples()).then(() => loadReads())
    .then(() => ensureStartData())
    .then(() => {
      const p = COMP.find(x => x.n === PLAYER_NAME);
      if (!p) { showError(`Player not found: <strong>${PLAYER_NAME}</strong>`); return; }
      MV_CENTER = computeMvCenter(); // calibrate to population median — same as renderAll() in index.html
      renderPlayerPage(p);
    })
    .catch(e => showError('Failed to load player data. ' + e.message));
}
</script>
</body>
</html>
