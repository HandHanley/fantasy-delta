<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DELTA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:#6ee7b7;text-decoration:none}
a:hover{text-decoration:underline}
.page{max-width:680px;margin:0 auto;padding:16px 14px 48px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #1f2937}
.nav-back{font-size:12px;color:#718096;display:flex;align-items:center;gap:5px;transition:color .15s}
.nav-back:hover{color:#e2e8f0;text-decoration:none}
.nav-brand{font-size:11px;font-weight:700;color:#6ee7b7;letter-spacing:.05em}
.hero{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.hero-hs{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #2d4a3e;background:#1a202c;flex-shrink:0}
.hero-ph{width:72px;height:72px;border-radius:50%;background:#1a202c;border:1px solid #2d3748;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;color:#4a5568}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#e2e8f0;line-height:1.1;margin-bottom:5px}
.hero-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px;color:#a0aec0;margin-bottom:3px}
.hero-bg{font-size:11px;color:#718096;margin-bottom:7px}
.hero-verdict{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.verdict-badge{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.hero-vals{font-size:11px;color:#a0aec0}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.03em}
.bs{background:#064e3b;color:#6ee7b7}
.bi{background:#0c4a6e;color:#7dd3fc}
.bn{background:#1f2937;color:#9ca3af}
.bw{background:#451a03;color:#fcd34d}
.bd{background:#3b0d0d;color:#fca5a5}
.card{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#4a5568;margin-bottom:10px}
.card-sub{font-size:9px;color:#374151;font-weight:400;margin-top:2px}
.dd-section-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#4a5568;margin-bottom:8px}
.dd-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dd-prog-label{font-size:10px;color:#718096;width:36px;flex-shrink:0}
.dd-prog-bar{flex:1;height:5px;background:#1a202c;border-radius:3px;overflow:hidden}
.dd-prog-fill{height:100%;border-radius:3px}
.dd-prog-val{font-size:10px;font-weight:600;width:32px;text-align:right;flex-shrink:0}
.prod-table{width:100%;border-collapse:collapse;font-size:11px}
.prod-table th{font-size:9px;font-weight:600;color:#4a5568;letter-spacing:.04em;text-align:right;padding:0 8px 6px}
.prod-table th:first-child{text-align:left}
.prod-table td{text-align:right;padding:5px 8px;border-top:1px solid #1a202c}
.prod-table td:first-child{text-align:left;color:#718096;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:#0d1117;border-radius:6px;padding:8px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;line-height:1.1;margin-bottom:2px}
.stat-lbl{font-size:9px;color:#4a5568;letter-spacing:.03em}
.bdr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a202c;font-size:11px}
.bdr-row:last-child{border-bottom:none}
.ripple-card{background:#0d1117;border-radius:6px;padding:10px;margin-bottom:6px}
.ripple-card:last-child{margin-bottom:0}
.scout-text{font-size:12px;color:#a0aec0;line-height:1.65}
.state-msg{text-align:center;padding:60px 20px;color:#4a5568;font-size:13px}
.freshness{font-size:10px;color:#374151;margin-top:6px;text-align:right}
@media(max-width:480px){.hero-name{font-size:20px}.hero-hs,.hero-ph{width:58px;height:58px}}
</style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a class="nav-back" href="index.html">← Rankings</a>
    <span class="nav-brand">DELTA v1.0</span>
  </nav>
  <div id="state-loading" class="state-msg">Loading player data…</div>
  <div id="state-error" class="state-msg" style="display:none"></div>
  <div id="player-content" style="display:none"></div>
</div>
<script src="delta-engine.js"></script>
<script>
const params = new URLSearchParams(location.search);
const PLAYER_NAME = decodeURIComponent(params.get('name') || params.get('player') || '');

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  const el = document.getElementById('state-error');
  el.style.display = '';
  el.innerHTML = msg + '<br><br><a href="index.html">← Back to Rankings</a>';
}

function showContent(html) {
  document.getElementById('state-loading').style.display = 'none';
  const el = document.getElementById('player-content');
  el.style.display = '';
  el.innerHTML = html;
}

function ppgClr(v) {
  return v >= 18 ? '#6ee7b7' : v >= 14 ? '#7dd3fc' : v >= 10 ? '#fcd34d' : v > 0 ? '#fc8181' : '#2d3748';
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function buildHeroHTML(p) {
  const ct = CONTRACTS.find(c => c.n === p.n);
  const dp = DRAFT_PICKS[p.n];
  const team = (typeof AL !== 'undefined' && AL[p.t]) ? AL[p.t] : p.t;
  const vt = (vTag(p).match(/>([a-z ]+)</) || [,''])[1];
  const vc = vt.includes('strong buy') ? '#6ee7b7' : vt === 'buy' ? '#9ae6b4'
    : vt === 'hold' ? '#cbd5e0' : vt.includes('strong sell') ? '#fca5a5' : '#fc8181';
  const mv = mvAsset(p);
  const adjP = getAdjProj(p);
  const hs = (typeof HEADSHOTS !== 'undefined') && HEADSHOTS[p.n];
  const hsHtml = hs
    ? `<img class="hero-hs" src="${hs}" alt="${p.n}" onerror="this.outerHTML='<div class=hero-ph>👤</div>'">`
    : `<div class="hero-ph">👤</div>`;

  // College + draft on same muted line, no accent color for draft pick
  const bgParts = [];
  if (COLLEGES && COLLEGES[p.n]) bgParts.push(COLLEGES[p.n]);
  if (dp) bgParts.push(`${dp.y} Rd${dp.r} Pick ${dp.p}`);
  const bgLine = bgParts.length ? `<div class="hero-bg">${bgParts.join(' · ')}</div>` : '';

  return `<div class="hero">
    ${hsHtml}
    <div class="hero-info">
      <div class="hero-name">${p.n}</div>
      <div class="hero-meta">
        <span class="badge bn">${p.pos}</span>
        <span>${team}</span>
        <span>Age ${p.a.toFixed(1)}</span>
        ${ct ? `<span style="color:#718096">Thru ${ct.end}${ct.end<=2026?' ⚠':''}</span>` : ''}
      </div>
      ${bgLine}
      <div class="hero-verdict">
        <span class="verdict-badge" style="color:${vc}">${vt}</span>
        <span class="hero-vals">Mkt ${p.ktcEff.toLocaleString()} · Model ${mv >= 19999 ? '19,999+' : mv.toLocaleString()} · Proj ${adjP.toFixed(1)} PPG</span>
      </div>
    </div>
  </div>`;
}

// ── DELTA Score Arc ──────────────────────────────────────────────────────────
function buildDSTrajectoryHTML(p) {
  const ds = p.dsScore;
  if (ds == null) return '';
  const pos = p.pos || p.p || 'WR';

  // 2024 estimate: age-1, use ppg24 as recent production, same opp/contract as approx
  const prevAge = (p.a || 22) - 1;
  const pA = dsAge(prevAge, pos);
  const pP = dsProduction(p.ppg24||0, p.ppg23||0, p.ppg22||0, p.g24||16, pos, p);
  const pO = dsOpportunity(p);
  const pC = dsCont(p);
  const ds2024 = Math.round(Math.min(99, pA + pP + pO + pC));

  // 2026 projection: age+1, projected PPG as new recent season
  const nextAge = (p.a || 22) + 1;
  const nA = dsAge(nextAge, pos);
  const nP = dsProduction(p.proj||p.ppg25||0, p.ppg25||0, p.ppg24||0, p.g25||0, pos, p);
  const nO = dsOpportunity(p);
  const nC = dsCont(p);
  const ds2026 = Math.round(Math.min(p.g25===0 ? 89 : 99, nA + nP + nO + nC));

  const dsC = dsColor(ds);
  const d4C = dsColor(ds2024);
  const d6C = dsColor(ds2026);

  const bar = (score, color) => `
    <div style="height:4px;background:#1a202c;border-radius:3px;overflow:hidden;margin-bottom:4px">
      <div style="width:${Math.round((score/99)*100)}%;height:100%;background:${color};border-radius:3px"></div>
    </div>`;

  const pt = (yr, score, color, note) => `
    <div style="flex:1;text-align:center">
      <div style="font-size:9px;color:#4a5568;margin-bottom:5px">${yr}</div>
      ${bar(score, color)}
      <div style="font-size:24px;font-weight:800;line-height:1;color:${color}">${score}</div>
      <div style="font-size:9px;color:#374151;margin-top:3px">${note}</div>
    </div>`;

  const arr = (from, to) => {
    const c = to > from ? '#6ee7b7' : to < from ? '#fca5a5' : '#718096';
    const sym = to > from ? '↑' : to < from ? '↓' : '→';
    return `<div style="font-size:18px;color:${c};padding-top:18px;flex-shrink:0">${sym}</div>`;
  };

  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">DELTA Score Arc</div>
    <div class="card-sub" style="margin-bottom:14px">Estimated 2024 · Current 2025 · Projected 2026</div>
    <div style="display:flex;align-items:flex-start;gap:8px">
      ${pt('2024 est', ds2024, d4C, 'approx')}
      ${arr(ds2024, ds)}
      ${pt('2025', ds, dsC, 'current')}
      ${arr(ds, ds2026)}
      ${pt('2026 proj', ds2026, d6C, 'if proj holds')}
    </div>
    <div style="font-size:9px;color:#374151;margin-top:10px;text-align:center">
      2024 uses age−1 and prior production · opportunity &amp; contract approximated from current values
    </div>
  </div>`;
}

// ── PPG Trend ─────────────────────────────────────────────────────────────────
function buildProductionHTML(p) {
  const years = [
    { yr: '2022', ppg: p.ppg22 || 0, g: p.g22 || null },
    { yr: '2023', ppg: p.ppg23 || 0, g: p.g23 || null },
    { yr: '2024', ppg: p.ppg24 || 0, g: p.g24 || null },
    { yr: '2025', ppg: p.ppg25 || 0, g: p.g25 || null },
  ].filter(y => y.ppg > 0);
  if (!years.length) return '';

  const posAvg = DS_AVG[p.pos] || 12;
  const maxPpg = Math.max(...years.map(y => y.ppg), 1);
  const barH = 56;

  // Three separate rows: values, bars, labels
  const vals = years.map(y =>
    `<div style="flex:1;text-align:center;font-size:10px;font-weight:600;color:${ppgClr(y.ppg)}">${y.ppg.toFixed(1)}</div>`
  ).join('');

  const bars = years.map(y => {
    const h = Math.max(8, Math.round((y.ppg / maxPpg) * barH));
    return `<div style="flex:1;display:flex;align-items:flex-end">
      <div style="width:100%;height:${h}px;background:${ppgClr(y.ppg)};border-radius:2px 2px 0 0"></div>
    </div>`;
  }).join('');

  const lbls = years.map(y =>
    `<div style="flex:1;text-align:center;font-size:9px;color:#4a5568">${y.yr.slice(2)}</div>`
  ).join('');

  const tableRows = years.map(y => {
    const diff = (y.ppg - posAvg).toFixed(1);
    const dc = diff > 0 ? '#6ee7b7' : diff < 0 ? '#fca5a5' : '#718096';
    return `<tr>
      <td>${y.yr}</td>
      <td style="color:${ppgClr(y.ppg)};font-weight:600">${y.ppg.toFixed(1)}</td>
      <td style="color:#718096">${y.g != null && y.g > 0 ? y.g : '—'}</td>
      <td style="color:${dc}">${diff > 0 ? '+' : ''}${diff}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">PPG Trend</div>
    <div class="card-sub" style="margin-bottom:10px">Adjusted for current scoring format</div>
    <div style="display:flex;gap:4px;margin-bottom:2px">${vals}</div>
    <div style="display:flex;gap:4px;height:${barH}px">${bars}</div>
    <div style="display:flex;gap:4px;margin-top:3px;margin-bottom:10px">${lbls}</div>
    <table class="prod-table">
      <thead><tr>
        <th>Season</th><th>PPG</th><th>Games</th>
        <th title="PPG vs current-season positional average — same value used across all years">vs pos avg *</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div style="font-size:9px;color:#374151;margin-top:6px">* Pos avg = ${posAvg} PPG (current-season average, applied flat across all years) · Games load from nightly pipeline</div>
  </div>`;
}

// ── EPA / Efficiency ──────────────────────────────────────────────────────────
function buildEPAHTML(p) {
  const posLabel = p.pos === 'QB' ? 'Passing' : p.pos === 'RB' ? 'Rushing' : 'Receiving';
  const sublabel = `${posLabel} EPA per play by season — how much scoring value this player added above average on each touch or route`;

  const epas = [
    { yr: '2022', v: p.e22 || 0 },
    { yr: '2023', v: p.e23 || 0 },
    { yr: '2024', v: p.e24 || 0 },
    { yr: '2025', v: p.e25 || 0 },
  ].filter(x => x.v !== 0);

  if (!epas.length) return '';

  // Absolute scale: 0.25 EPA/play fills the bar fully (elite level for any position)
  const SCALE = 0.25;

  const getClr = v => {
    const a = Math.abs(v);
    if (v >= 0) return a >= 0.12 ? '#6ee7b7' : a >= 0.04 ? '#a7f3d0' : '#fcd34d';
    else        return a >= 0.12 ? '#fc8181' : a >= 0.04 ? '#fca5a5' : '#fcd34d';
  };

  const rows = epas.map(x => {
    const pct = Math.min(100, Math.round((Math.abs(x.v) / SCALE) * 100));
    const clr = getClr(x.v);
    const isPos = x.v >= 0;
    const sign = x.v > 0 ? '+' : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1a202c">
      <div style="font-size:10px;color:#718096;width:26px;flex-shrink:0">${x.yr.slice(2)}</div>
      <div style="flex:1;display:flex;justify-content:flex-end;align-items:center;height:8px">
        ${!isPos ? `<div style="width:${pct}%;height:100%;background:${clr};border-radius:3px 0 0 3px"></div>` : ''}
      </div>
      <div style="width:2px;height:14px;background:#374151;flex-shrink:0;border-radius:1px"></div>
      <div style="flex:1;display:flex;justify-content:flex-start;align-items:center;height:8px">
        ${isPos ? `<div style="width:${pct}%;height:100%;background:${clr};border-radius:0 3px 3px 0"></div>` : ''}
      </div>
      <div style="font-size:11px;font-weight:600;color:${clr};width:42px;text-align:right">${sign}${x.v.toFixed(2)}</div>
    </div>`;
  }).join('');

  const trendClr = p.epaTr === 'up' ? '#6ee7b7' : p.epaTr === 'down' ? '#fc8181' : '#718096';
  const trendTxt = p.epaTr === 'up' ? '↑ Improving' : p.epaTr === 'down' ? '↓ Declining' : '→ Flat';

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div class="card-label" style="margin-bottom:2px">EPA per Play</div>
        <div class="card-sub">${sublabel}</div>
      </div>
      ${p.epaTr ? `<span style="font-size:10px;font-weight:600;color:${trendClr};flex-shrink:0;margin-left:10px">${trendTxt}</span>` : ''}
    </div>
    ${rows}
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#374151;margin-top:6px;padding:0 34px 0 0">
      <span>← below avg</span>
      <span>above avg →</span>
    </div>
  </div>`;
}

// ── Start Profile ─────────────────────────────────────────────────────────────
function buildStartProfileCard(p) {
  const gl = glOf(p);
  if (!gl) return '';
  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">Start Profile</div>
    <div class="card-sub" style="margin-bottom:10px">${gl.g} games sampled · scored against position-specific PPG thresholds</div>
    <div class="dd-prog-row">
      <div class="dd-prog-label">Elite</div>
      <div class="dd-prog-bar"><div class="dd-prog-fill" style="width:${gl.elite}%;background:#6ee7b7"></div></div>
      <div class="dd-prog-val" style="color:#6ee7b7">${gl.elite}%</div>
    </div>
    <div class="dd-prog-row">
      <div class="dd-prog-label">Hit</div>
      <div class="dd-prog-bar"><div class="dd-prog-fill" style="width:${100-gl.miss}%;background:#7dd3fc"></div></div>
      <div class="dd-prog-val" style="color:#7dd3fc">${100-gl.miss}%</div>
    </div>
    <div class="dd-prog-row">
      <div class="dd-prog-label">Miss</div>
      <div class="dd-prog-bar"><div class="dd-prog-fill" style="width:${gl.miss}%;background:#fc8181"></div></div>
      <div class="dd-prog-val" style="color:#fc8181">${gl.miss}%</div>
    </div>
    <div style="font-size:9px;color:#374151;margin-top:6px">Elite = exceeded the top-starter PPG threshold · Hit = startable · Miss = below startable threshold</div>
  </div>`;
}

// ── Opportunity ───────────────────────────────────────────────────────────────
function buildOpportunityHTML(p) {
  const oppSc = getOppScore(p.n, p.pos);
  if (!oppSc) return '';
  const st25 = (typeof PLAYER_STATS !== 'undefined') && PLAYER_STATS[p.n] && PLAYER_STATS[p.n]['2025'];
  const isWR = p.pos === 'WR' || p.pos === 'TE';
  const scC = oppScoreColor ? oppScoreColor(oppSc) : (oppSc>=88?'#6ee7b7':oppSc>=70?'#7dd3fc':oppSc>=55?'#fcd34d':'#fc8181');
  const tier = oppSc>=88?(isWR?'Elite alpha':'Elite workhorse'):oppSc>=75?'Clear starter':oppSc>=60?'Role player':'Committee/specialist';
  const sysClr = p.sys>=70?'#6ee7b7':p.sys>=55?'#7dd3fc':p.sys>=40?'#fcd34d':'#fc8181';

  let usageRows = '';
  if (st25) {
    const tgtS = st25.target_share || 0;
    const airS = st25.air_yds_share || 0;
    const rzT = st25.rz_targets;
    const rzC = st25.rz_carries;
    if (isWR) {
      usageRows = [
        ['Target share', (tgtS*100).toFixed(1)+'%', tgtS>=.28?'#6ee7b7':tgtS>=.20?'#7dd3fc':tgtS>=.14?'#fcd34d':'#fc8181'],
        ['Air yards share', (airS*100).toFixed(1)+'%', airS>=.38?'#6ee7b7':airS>=.28?'#7dd3fc':airS>=.18?'#fcd34d':'#fc8181'],
        ['RZ targets', rzT!=null?rzT:'—', rzT>=18?'#6ee7b7':rzT>=12?'#7dd3fc':rzT>=7?'#fcd34d':'#fc8181'],
      ].map(([l,v,c])=>`<div class="bdr-row"><span style="color:#718096">${l}</span><span style="font-weight:600;color:${c}">${v}</span></div>`).join('');
    } else {
      const g = st25.games || 17;
      const rsRaw = st25.rush_share || 0;
      // Apply same 17/g adjustment used in workhorse score — rush_share in the pipeline
      // is a season total ratio (player carries / team carries), so it's diluted by missed
      // games. Adjusted value reflects true per-game role intensity when active.
      const rsAdj = Math.min(1, rsRaw * (17 / g));
      const rsLabel = g < 17 ? `Rush share/game · ${g}g` : 'Rush share';
      usageRows = [
        [rsLabel, (rsAdj*100).toFixed(1)+'%', rsAdj>=.55?'#6ee7b7':rsAdj>=.40?'#7dd3fc':rsAdj>=.25?'#fcd34d':'#fc8181'],
        ['Target share', (tgtS*100).toFixed(1)+'%', tgtS>=.18?'#6ee7b7':tgtS>=.12?'#7dd3fc':tgtS>=.08?'#fcd34d':'#fc8181'],
        ['RZ carries', rzC!=null?rzC:'—', rzC>=55?'#6ee7b7':rzC>=35?'#7dd3fc':rzC>=20?'#fcd34d':'#fc8181'],
        ['RZ targets', rzT!=null?rzT:'—', rzT>=12?'#6ee7b7':rzT>=7?'#7dd3fc':rzT>=3?'#fcd34d':'#fc8181'],
      ].map(([l,v,c])=>`<div class="bdr-row"><span style="color:#718096">${l}</span><span style="font-weight:600;color:${c}">${v}</span></div>`).join('');
    }
  }

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${usageRows?'10px':'0'}">
      <div>
        <div class="card-label" style="margin-bottom:2px">Opportunity · 2025</div>
        <div class="card-sub" style="color:${scC};font-weight:600">${tier}</div>
      </div>
      <div style="font-size:32px;font-weight:800;line-height:1;color:${scC}">${oppSc}</div>
    </div>
    ${usageRows}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #1a202c;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:10px;color:#718096">Offensive System Score</span>
      <span style="font-size:14px;font-weight:700;color:${sysClr}">${p.sys}</span>
    </div>
    ${p.och ? `<div style="font-size:10px;color:#fcd34d;margin-top:6px">⚠ Coordinator change — model applies a discount until new scheme shows in data</div>` : ''}
  </div>`;
}

// ── Contract ──────────────────────────────────────────────────────────────────
function buildContractHTML(p) {
  const ct = CONTRACTS.find(c => c.n === p.n);
  if (!ct) return '';
  const fmt = n => n >= 1000000 ? '$' + (n/1000000).toFixed(1) + 'M' : '$' + n.toLocaleString();
  const st = contractStatus(ct);
  const yrsLeft = ct.end - 2026;
  const yrsClr = yrsLeft<=1?'#fca5a5':yrsLeft<=2?'#fcd34d':yrsLeft>=4?'#6ee7b7':'#7dd3fc';
  return `<div class="card">
    <div class="card-label">Contract</div>
    <div class="stat-grid" style="margin-bottom:12px">
      <div class="stat-box"><div class="stat-val">${fmt(ct.aav)}</div><div class="stat-lbl">Per Year</div></div>
      <div class="stat-box"><div class="stat-val">${fmt(ct.total)}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${yrsClr}">${yrsLeft}</div><div class="stat-lbl">Yrs Left</div></div>
    </div>
    <div class="bdr-row"><span style="color:#718096">Status</span><span class="badge ${st.cls}">${st.label}</span></div>
    <div class="bdr-row"><span style="color:#718096">Expires</span><span>${ct.end}${ct.end<=2026?' ⚠':''}</span></div>
    <div style="margin-top:8px">${dynastySignal(ct)}</div>
    ${ct.note ? `<div style="font-size:10px;color:#4a5568;margin-top:6px;font-style:italic">${ct.note}</div>` : ''}
    <div style="font-size:9px;color:#374151;margin-top:8px">Note: First-round rookie 5th-year options not yet reflected.</div>
  </div>`;
}

// ── Ripple Effects ────────────────────────────────────────────────────────────
function buildRippleHTML(p) {
  const entries = RIPPLE.filter(r => r.n === p.n);
  if (!entries.length) return '';
  return `<div class="card">
    <div class="card-label">Ripple Effect</div>
    ${entries.map(r=>`<div class="ripple-card">
      <span class="badge ${r.d==='up'?'bs':'bd'}">${r.d==='up'?'▲':'▼'} ${r.delta}</span>
      <div style="font-size:11px;color:#a0aec0;line-height:1.5;margin-top:5px">${r.reason}</div>
    </div>`).join('')}
  </div>`;
}

// ── Scout Report ──────────────────────────────────────────────────────────────
function buildScoutHTML() {
  return `<div class="card">
    <div class="card-label" style="margin-bottom:2px">Scouting Report</div>
    <div class="card-sub" style="margin-bottom:10px">AI-generated narrative — player context, history &amp; dynasty outlook. Complements The Read above with qualitative analysis.</div>
    <div id="scout-text" class="scout-text" style="color:#4a5568">Loading…</div>
  </div>`;
}

// ── Age Curve ─────────────────────────────────────────────────────────────────
function buildAgeCurveHTML(p) {
  const pos = p.pos || p.p || 'WR';
  const ages = Array.from({length: 19}, (_, i) => i + 20); // 20–38
  const scores = ages.map(a => dsAge(a, pos));
  const W = 320, H = 72, padL = 28, padR = 8, padT = 10, padB = 18;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const toX = a => padL + ((a - 20) / 18) * plotW;
  const toY = s => padT + plotH - (s / 25) * plotH;

  const points = ages.map((a, i) => toX(a).toFixed(1) + ',' + toY(scores[i]).toFixed(1)).join(' ');

  // Peak zone — ages where score >= 23
  const peakAges = ages.filter(a => dsAge(a, pos) >= 23);
  const peakStart = peakAges[0] || 20;
  const peakEnd = peakAges[peakAges.length - 1] || 27;
  const pkX1 = toX(peakStart), pkX2 = toX(peakEnd);

  // Fill path under curve (area chart feel)
  const fillPts = ages.map((a, i) => toX(a).toFixed(1) + ',' + toY(scores[i]).toFixed(1)).join(' ');
  const fillPath = 'M ' + toX(20).toFixed(1) + ',' + toY(0).toFixed(1)
    + ' L ' + fillPts.split(' ').join(' L ')
    + ' L ' + toX(38).toFixed(1) + ',' + toY(0).toFixed(1) + ' Z';

  // Player marker
  const clampedAge = Math.min(38, Math.max(20, p.a || 25));
  const playerScore = dsAge(clampedAge, pos);
  const mx = toX(clampedAge), my = toY(playerScore);
  const col = dsColor(p.dsScore || 50);

  // Y-axis ticks at 0, 12, 25
  const yTicks = [0, 12, 25].map(s =>
    '<line x1="' + (padL-3) + '" y1="' + toY(s).toFixed(1) + '" x2="' + padL + '" y2="' + toY(s).toFixed(1) + '" stroke="#2d3748" stroke-width="1"/>'
    + '<text x="' + (padL-5) + '" y="' + (toY(s)+3).toFixed(1) + '" fill="#374151" font-size="7" text-anchor="end">' + s + '</text>'
  ).join('');

  const ageLabels = [20, 24, 28, 32, 36, 38].map(a =>
    '<text x="' + toX(a).toFixed(1) + '" y="' + (padT+plotH+13) + '" fill="#4a5568" font-size="7" text-anchor="middle">' + a + '</text>'
  ).join('');

  return '<div class="card">'
    + '<div class="card-label" style="margin-bottom:2px">Age Curve · ' + pos + '</div>'
    + '<div class="card-sub" style="margin-bottom:8px">Dynasty value score vs age — green shading marks the prime window</div>'
    + '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;overflow:visible">'

    // Peak zone shading
    + '<rect x="' + pkX1.toFixed(1) + '" y="' + padT + '" width="' + (pkX2-pkX1).toFixed(1) + '" height="' + plotH + '" fill="#6ee7b7" opacity="0.07" rx="2"/>'

    // Fill under curve
    + '<path d="' + fillPath + '" fill="#374151" opacity="0.2"/>'

    // Curve line
    + '<polyline points="' + points + '" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>'

    // Axes
    + '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (padT+plotH) + '" stroke="#1f2937" stroke-width="1"/>'
    + '<line x1="' + padL + '" y1="' + (padT+plotH) + '" x2="' + (W-padR) + '" y2="' + (padT+plotH) + '" stroke="#1f2937" stroke-width="1"/>'

    // Y ticks + labels
    + yTicks

    // Age labels
    + ageLabels

    // No floating "prime" label in SVG — the green shading shows the window; footer note carries the text

    // Player dot + vertical guide
    + '<line x1="' + mx.toFixed(1) + '" y1="' + (padT+plotH) + '" x2="' + mx.toFixed(1) + '" y2="' + my.toFixed(1) + '" stroke="' + col + '" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>'
    + '<circle cx="' + mx.toFixed(1) + '" cy="' + my.toFixed(1) + '" r="4.5" fill="' + col + '" stroke="#0a0e17" stroke-width="1.5"/>'

    // Player age label — above dot normally, below when near top to avoid colliding with "prime" label
    + (playerScore >= 22
      ? '<text x="' + mx.toFixed(1) + '" y="' + (my+16).toFixed(1) + '" fill="' + col + '" font-size="8" text-anchor="middle" font-weight="bold">' + clampedAge.toFixed(1) + '</text>'
      : '<text x="' + mx.toFixed(1) + '" y="' + (my-8).toFixed(1)  + '" fill="' + col + '" font-size="8" text-anchor="middle" font-weight="bold">' + clampedAge.toFixed(1) + '</text>'
    )

    + '</svg>'
    + '<div style="font-size:9px;color:#374151;text-align:center;margin-top:2px">'
    + pos + ' prime: ages ' + peakStart + '–' + peakEnd + ' · Age score ' + playerScore + '/25'
    + '</div>'
    + '</div>';
}

// ── Comparable Players ────────────────────────────────────────────────────────
function buildComparableHTML(p) {
  const pos = p.pos || p.p || 'WR';
  const ds = p.dsScore;
  if (ds == null) return '';

  const myOpp = getOppScore(p.n, pos) || 50;

  const peers = COMP.filter(x =>
    (x.pos||x.p) === pos &&
    x.n !== p.n &&
    x.dsScore != null &&
    Math.abs((x.dsScore||0) - ds) <= 22
  );

  const scored = peers.map(peer => {
    const dsDiff = Math.abs((peer.dsScore||0) - ds);
    const ageDiff = Math.abs((peer.a||0) - (p.a||0));
    const peerOpp = getOppScore(peer.n, peer.pos) || 50;
    const oppDiff = Math.abs(peerOpp - myOpp);
    const sim = dsDiff * 2.5 + ageDiff * 4.0 + oppDiff * 0.4;
    return { peer, sim, dsDiff, ageDiff };
  });

  const comps = scored.sort((a, b) => a.sim - b.sim).slice(0, 3);
  if (!comps.length) return '';

  const cards = comps.map(({peer, dsDiff, ageDiff}) => {
    const vt = (vTag(peer).match(/>([a-z ]+)</) || [,''])[1];
    const vc = vt.includes('strong buy') ? '#6ee7b7' : vt === 'buy' ? '#9ae6b4'
      : vt === 'hold' ? '#cbd5e0' : vt.includes('strong sell') ? '#fca5a5' : '#fc8181';
    const dsc = dsColor(peer.dsScore);
    const team = (typeof AL !== 'undefined' && AL[peer.t]) ? AL[peer.t] : peer.t;
    const note = dsDiff <= 2 ? 'near-identical score'
      : ageDiff <= 0.8 ? 'same age tier'
      : ageDiff <= 1.5 ? (peer.a > p.a ? 'slightly older' : 'slightly younger')
      : 'similar profile';

    return '<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#0d1117;border-radius:6px">'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:12px;font-weight:600;margin-bottom:2px">'
      + '<a href="player.html?name=' + encodeURIComponent(peer.n) + '" style="color:#e2e8f0;text-decoration:none" '
      + 'onmouseover="this.style.color=\'#6ee7b7\'" onmouseout="this.style.color=\'#e2e8f0\'">' + peer.n + '</a>'
      + '</div>'
      + '<div style="font-size:10px;color:#718096">' + team + ' · Age ' + peer.a.toFixed(1) + ' · ' + note + '</div>'
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-size:20px;font-weight:800;color:' + dsc + ';line-height:1">' + peer.dsScore + '</div>'
      + '<div style="font-size:10px;font-weight:700;color:' + vc + ';text-transform:uppercase;letter-spacing:.04em">' + vt + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  return '<div class="card">'
    + '<div class="card-label" style="margin-bottom:2px">Comparable Players</div>'
    + '<div class="card-sub" style="margin-bottom:10px">Closest DELTA matches at ' + pos + ' — ranked by score, age, and opportunity similarity</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">' + cards + '</div>'
    + '</div>';
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderPlayerPage(p) {
  ensureScoutData().then(() => {
    const el = document.getElementById('scout-text');
    if (el) {
      el.style.color = '#a0aec0';
      el.textContent = SCOUT[p.n] || 'No scouting report available yet.';
    }
  });

  showContent(`
    ${buildHeroHTML(p)}
    ${buildDSBreakdownHTML(p)}
    ${buildReadHTML(p)}
    ${buildStartProfileCard(p)}
    ${buildDSTrajectoryHTML(p)}
    ${buildAgeCurveHTML(p)}
    ${buildProductionHTML(p)}
    ${buildEPAHTML(p)}
    ${buildOpportunityHTML(p)}
    ${buildContractHTML(p)}
    ${buildRippleHTML(p)}
    ${buildComparableHTML(p)}
    ${buildScoutHTML()}
    <div class="freshness">Data refreshes nightly · DELTA v1.0</div>
  `);
  document.title = p.n + ' — DELTA';
}

// ── Init ──────────────────────────────────────────────────────────────────────
if (!PLAYER_NAME) {
  showError('No player specified. Use <code>player.html?name=Josh+Allen</code>');
} else {
  loadLiveMarketValues()
    .then(() => loadPlayerStats())
    .then(() => loadPlayerContracts())
    .then(() => ensureStartData())
    .then(() => {
      const p = COMP.find(x => x.n === PLAYER_NAME);
      if (!p) { showError(`Player not found: <strong>${PLAYER_NAME}</strong>`); return; }
      renderPlayerPage(p);
    })
    .catch(e => showError('Failed to load player data. ' + e.message));
}
</script>
</body>
