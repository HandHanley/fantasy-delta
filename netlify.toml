/**
 * DELTA Live Market Values Loader
 * 
 * Add this script block to dynasty_v5_5.html just before the closing </script> tag.
 * 
 * What it does:
 *   1. Fetches data/market-values.json (the file GitHub Actions updates nightly)
 *   2. Matches player names from that file to players already in DELTA's RAW array
 *   3. Updates each player's market value (the .k property) with the fresh number
 *   4. Shows a small "Last updated" timestamp in the UI so you know the data is live
 * 
 * Name matching:
 *   Player names between FantasyCalc and DELTA won't always match perfectly
 *   (e.g. "CeeDee Lamb" vs "Cee Dee Lamb"). The fuzzy matcher below handles
 *   the most common mismatches. You can add more to the ALIASES object as needed.
 */

// ── NAME ALIASES ──────────────────────────────────────────────────────────
// Add entries here whenever you notice a player isn't getting updated.
// Format: 'FantasyCalc name': 'DELTA name'
const FC_ALIASES = {
  'CeeDee Lamb':        'CeeDee Lamb',
  'Cee Dee Lamb':       'CeeDee Lamb',
  'DK Metcalf':         'D.K. Metcalf',
  'AJ Brown':           'A.J. Brown',
  'Deebo Samuel Sr.':   'Deebo Samuel',
  "De'Von Achane":      "De'Von Achane",
  'Travis Etienne Jr.': 'Travis Etienne',
  'Michael Pittman':    'Michael Pittman Jr.',
  'Ken Walker III':     'Kenneth Walker III',
};

// ── LOADER ────────────────────────────────────────────────────────────────
async function loadLiveMarketValues() {
  try {
    const res = await fetch('./data/market-values.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Skip if file is the empty placeholder
    if (data.playerCount === 0) {
      console.log('[DELTA] Market values not yet populated — using baked-in values');
      return;
    }

    const values = data.values;
    let updated = 0;
    let notFound = [];

    // RAW is DELTA's main player array — update each player's .k (market value)
    for (const player of RAW) {
      const name = player.n;
      const alias = FC_ALIASES[name] || name;
      
      // Try exact match first, then alias
      const match = values[alias] || values[name];
      
      if (match) {
        player.k = match.value;       // Update the market value
        player.fcRank = match.overallRank; // Store overall rank for reference
        updated++;
      } else {
        notFound.push(name);
      }
    }

    console.log(`[DELTA] Live values loaded: ${updated} players updated, ${notFound.length} not matched`);
    if (notFound.length > 0 && notFound.length < 20) {
      console.log('[DELTA] Unmatched players:', notFound.join(', '));
    }

    // Show timestamp in the UI
    showDataFreshness(data.fetchedAt);

    // Re-render whatever tab is currently active with fresh values
    const activePanel = document.querySelector('.panel.active');
    if (activePanel) {
      // Trigger a re-sort/re-render by simulating a filter change
      const activeSort = document.querySelector('[data-sort-active]');
      if (activeSort) activeSort.click();
    }

  } catch (err) {
    // Silently fail — DELTA still works with baked-in values
    console.warn('[DELTA] Could not load live market values:', err.message);
  }
}

// ── FRESHNESS INDICATOR ───────────────────────────────────────────────────
function showDataFreshness(fetchedAt) {
  const date = new Date(fetchedAt);
  const hoursAgo = Math.round((Date.now() - date.getTime()) / 3600000);
  const label = hoursAgo < 2 ? 'Just updated' : 
                hoursAgo < 24 ? `${hoursAgo}h ago` : 
                `${Math.round(hoursAgo/24)}d ago`;

  // Find or create a freshness badge in the header area
  let badge = document.getElementById('delta-freshness');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'delta-freshness';
    badge.style.cssText = [
      'position:fixed', 'bottom:12px', 'right:12px',
      'background:#1a2332', 'border:1px solid #2d3f55',
      'border-radius:6px', 'padding:5px 10px',
      'font-size:10px', 'color:#4a90d9',
      'font-weight:600', 'z-index:999',
      'letter-spacing:0.5px'
    ].join(';');
    document.body.appendChild(badge);
  }
  badge.textContent = `Mkt values: ${label}`;
}

// ── KICK IT OFF ───────────────────────────────────────────────────────────
// Wait for the page to fully load before trying to update values
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadLiveMarketValues);
} else {
  loadLiveMarketValues();
}
