name: Fetch Backtest Data (one-off)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "nflreadpy@git+https://github.com/nflverse/nflreadpy" polars pyarrow pandas

      - name: Run backtest data fetcher
        run: python scripts/fetch-backtest-data.py

      - name: Commit backtest-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backtest-data.json
          git diff --staged --quiet || git commit -m "backtest calibration data (one-off)"
          git push
