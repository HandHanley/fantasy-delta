# Research-only. Runs a DELTA research study and uploads results as an artifact.
# NEVER commits to the repo — nothing reaches /data, the engine, or the site.
#
# Path: .github/workflows/research-study.yml
# In the Actions tab this appears as:  "DELTA research study"   <-- click THIS
# (GitHub lists workflows by their `name:` below, not by filename.)
name: DELTA research study

on:
  workflow_dispatch:
    inputs:
      study:
        description: "Which study to run"
        type: choice
        options:
          - "scarcity FINAL (principled derivation + uncertainty bands)"
          - "scarcity METHOD SWEEP (diagnostic only — see notes)"
          - "scarcity curves (old fixed-method run)"
          - "goal-line opportunity"
          - "TD% round 1 (TD% -> TD%)"
          - "TD% round 2 (TD% -> fantasy value)"
        default: "scarcity FINAL (principled derivation + uncertainty bands)"
      curve_seasons:
        description: "Window for the fixed-method curve study (ignored by the sweep)"
        default: "2021-2025"
      min_games:
        description: "Min games to qualify (ignored by the sweep)"
        default: "6"
      train_end:
        description: "Fit on seasons <= this year (TD% / goal-line studies only)"
        default: "2022"
      inspect:
        description: "Diagnostic: print available columns and exit"
        type: boolean
        default: false

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nflreadpy pandas numpy pyarrow polars

      - name: Run study
        run: |
          mkdir -p study/out
          set -o pipefail
          FLAGS=""
          if [ "${{ inputs.inspect }}" = "true" ]; then FLAGS="--inspect"; fi
          # 2>&1 so tracebacks land in the report, not just the console log
          case "${{ inputs.study }}" in
            "scarcity FINAL"*)
              python derive_scarcity_final.py 2>&1 | tee study/out/report_scarcity_final.txt ;;
            "scarcity METHOD SWEEP"*)
              python sweep_scarcity_method.py 2>&1 | tee study/out/report_method_sweep.txt ;;
            "scarcity curves"*)
              python derive_scarcity_curves.py --seasons ${{ inputs.curve_seasons }} --min-games ${{ inputs.min_games }} $FLAGS 2>&1 | tee study/out/report_scarcity.txt ;;
            "goal-line"*)
              python gl_opportunity_study.py --train-end ${{ inputs.train_end }} $FLAGS 2>&1 | tee study/out/report_goalline.txt ;;
            "TD% round 1"*)
              python td_pct_study.py --train-end ${{ inputs.train_end }} $FLAGS 2>&1 | tee study/out/report_td_round1.txt ;;
            "TD% round 2"*)
              python td_pct_round2.py --train-end ${{ inputs.train_end }} $FLAGS 2>&1 | tee study/out/report_td_round2.txt ;;
          esac

      - name: Upload results (artifact only — never committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delta-study-results
          path: study/out/
