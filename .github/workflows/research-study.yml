# Research-only. Runs a DELTA research study and uploads results as an artifact.
# NEVER commits to the repo — nothing reaches /data, the engine, or the site.
# Path: .github/workflows/research-study.yml
name: DELTA research study

on:
  workflow_dispatch:
    inputs:
      study:
        description: "Which study to run"
        type: choice
        options:
          - "goal-line opportunity (does GL usage add lift?)"
          - "TD% round 1 (TD% -> TD%)"
          - "TD% round 2 (TD% -> fantasy value)"
        default: "goal-line opportunity (does GL usage add lift?)"
      train_end:
        description: "Fit on seasons <= this year (test after)"
        default: "2022"
      pos:
        description: "Position filter for the goal-line study"
        type: choice
        options: ["ALL", "RB", "WR", "TE"]
        default: "ALL"
      inspect:
        description: "Diagnostic: print available columns and exit"
        type: boolean
        default: false

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nflreadpy pandas numpy pyarrow polars

      - name: Run study
        run: |
          mkdir -p study/out
          set -o pipefail
          FLAGS=""
          if [ "${{ inputs.inspect }}" = "true" ]; then FLAGS="--inspect"; fi
          case "${{ inputs.study }}" in
            "goal-line"*)
              # 2>&1 so tracebacks land in the report, not just the console
              python gl_opportunity_study.py --train-end ${{ inputs.train_end }} --pos ${{ inputs.pos }} $FLAGS 2>&1 | tee study/out/report_goalline.txt ;;
            "TD% round 1"*)
              python td_pct_study.py --train-end ${{ inputs.train_end }} $FLAGS 2>&1 | tee study/out/report_td_round1.txt ;;
            "TD% round 2"*)
              python td_pct_round2.py --train-end ${{ inputs.train_end }} $FLAGS 2>&1 | tee study/out/report_td_round2.txt ;;
          esac

      - name: Upload results (artifact only — never committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delta-study-results
          path: study/out/
