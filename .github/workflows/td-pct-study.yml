# Research-only. Runs the QB TD% studies, uploads results as artifacts.
# NEVER commits to the repo — nothing reaches /data or the interface.
# Path: .github/workflows/td-pct-study.yml
name: TD% research study

on:
  workflow_dispatch:
    inputs:
      round:
        description: "Which study to run"
        type: choice
        options: ["round2 (TD% -> fantasy value)", "round1 (TD% -> TD%)", "both"]
        default: "round2 (TD% -> fantasy value)"
      inspect:
        description: "Diagnostic: print available columns and exit"
        type: boolean
        default: false
      min_att:
        description: "Qualifying-season attempt floor"
        default: "200"
      train_end:
        description: "Fit on seasons <= this year"
        default: "2022"

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nflreadpy pandas numpy pyarrow polars

      - name: Run study
        run: |
          mkdir -p study/out
          set -o pipefail
          COMMON="--min-att ${{ inputs.min_att }} --train-end ${{ inputs.train_end }}"
          if [ "${{ inputs.inspect }}" = "true" ]; then COMMON="--inspect"; fi
          R="${{ inputs.round }}"
          # 2>&1 so tracebacks land in the report too
          if [ "$R" = "round1 (TD% -> TD%)" ] || [ "$R" = "both" ]; then
            echo "### ROUND 1 ###"
            python td_pct_study.py $COMMON 2>&1 | tee study/out/report_round1.txt
          fi
          if [ "$R" = "round2 (TD% -> fantasy value)" ] || [ "$R" = "both" ]; then
            echo "### ROUND 2 ###"
            python td_pct_round2.py $COMMON 2>&1 | tee study/out/report_round2.txt
          fi

      - name: Upload results (artifact only — never committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: td-pct-study-results
          path: study/out/
