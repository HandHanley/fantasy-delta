# Research-only. Runs the QB TD% study, uploads results as an artifact.
# NEVER commits to the repo — nothing reaches /data or the interface.
# Path: .github/workflows/td-pct-study.yml
name: TD% research study

on:
  workflow_dispatch:
    inputs:
      inspect:
        description: "Diagnostic mode: print available columns and exit"
        type: boolean
        default: false
      min_att:
        description: "Qualifying-season attempt floor"
        default: "200"
      train_end:
        description: "Fit reversion on seasons <= this year"
        default: "2022"
      redzone:
        description: "Also pull red-zone context (heavy)"
        type: boolean
        default: false

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (nflreadpy is the current lib; nfl_data_py is deprecated fallback)
        run: |
          python -m pip install --upgrade pip
          pip install nflreadpy pandas numpy pyarrow polars

      - name: Run study
        run: |
          mkdir -p study/out
          ARGS="--min-att ${{ inputs.min_att }} --train-end ${{ inputs.train_end }}"
          if [ "${{ inputs.inspect }}" = "true" ]; then ARGS="--inspect"; fi
          if [ "${{ inputs.redzone }}" = "true" ]; then ARGS="$ARGS --rz"; fi
          echo "Running: python td_pct_study.py $ARGS"
          # 2>&1 so tracebacks (stderr) land in the report too — this is why v1's report was empty
          set -o pipefail
          python td_pct_study.py $ARGS 2>&1 | tee study/out/report.txt

      - name: Upload results (artifact only — never committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: td-pct-study-results
          path: study/out/
