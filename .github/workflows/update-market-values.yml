name: Update Market Values

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install polars pyarrow pandas --quiet
          pip install 'nflreadpy@git+https://github.com/nflverse/nflreadpy' --quiet

      - name: Fetch FantasyCalc market values
        run: node scripts/fetch-market-values.js

      - name: Fetch scarcity-engine validation
        run: node scripts/fetch-scarcity-validation.js

      - name: Fetch NFL player stats
        run: python scripts/fetch-player-stats.py

      - name: Fetch game logs + snap counts
        run: python scripts/fetch-game-logs.py

      - name: Commit updated data
        run: |
          git config user.name "DELTA Bot"
          git config user.email "delta-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update market values, scarcity validation, player stats, and game logs [skip ci]"
            git push
          fi

      # Regression gate: recompute the Engine Audit (32/32 directional check)
      # against the freshly fetched market data and the SHIPPED engine in
      # index.html. Runs AFTER commit on purpose — fresh data always publishes;
      # a directional flip is an engine alarm (workflow fails -> email), not a
      # reason to serve stale data.
      - name: Engine Audit gate (scarcity directional validation)
        run: node scripts/engine-audit-gate.js
