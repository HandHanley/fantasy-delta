name: Update Market Values

on:
  schedule:
    # Run daily at 6am UTC (2am ET)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install nfl-data-py pandas --quiet

      - name: Fetch FantasyCalc market values
        run: node scripts/fetch-market-values.js

      - name: Fetch NFL player stats
        run: python scripts/fetch-player-stats.py

      - name: Commit updated data
        run: |
          git config user.name "DELTA Bot"
          git config user.email "delta-bot@users.noreply.github.com"
          git add data/market-values.json data/player-stats.json 2>/dev/null || git add data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update market values and player stats [skip ci]"
            git push
          fi
