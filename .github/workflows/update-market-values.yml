name: Update Market Values

on:
  schedule:
    # Run daily at 6am UTC (2am ET, 11pm PT)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market values from FantasyCalc
        run: node scripts/fetch-market-values.js

      - name: Commit updated values
        run: |
          git config user.name "DELTA Bot"
          git config user.email "delta-bot@users.noreply.github.com"
          git add data/market-values.json
          if git diff --staged --quiet; then
            echo "No changes to market values — skipping commit"
          else
            git commit -m "chore: update market values [skip ci]"
            git push
          fi
