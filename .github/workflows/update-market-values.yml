name: Update Market Values

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install polars pyarrow pandas --quiet
          pip install 'nflreadpy@git+https://github.com/nflverse/nflreadpy' --quiet

      - name: Fetch FantasyCalc market values
        run: node scripts/fetch-market-values.js

      - name: Fetch scarcity-engine validation
        run: node scripts/fetch-scarcity-validation.js

      - name: Fetch NFL player stats
        run: python scripts/fetch-player-stats.py

      - name: Commit updated data
        run: |
          git config user.name "DELTA Bot"
          git config user.email "delta-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update market values, scarcity validation, and player stats [skip ci]"
            git push
          fi
